services:
  interativa:
    image: interativa:latest
    build: .
    container_name: interativa
    restart: unless-stopped
    networks:
      - network_public
    environment:
      - NODE_ENV=production
      - PORT=3001
    volumes:
      - interativa_data:/app/data
      - interativa_uploads:/app/uploads
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=network_public"
      - "traefik.http.routers.interativa.rule=Host(`${DOMAIN:-interativa.adrofecha.com.br}`)"
      - "traefik.http.routers.interativa.entrypoints=websecure"
      - "traefik.http.routers.interativa.tls.certresolver=letsencryptresolver"
      - "traefik.http.services.interativa.loadbalancer.server.port=3001"
      # WebSocket support (Socket.io)
      - "traefik.http.middlewares.interativa-ws.headers.customrequestheaders.Connection=keep-alive, Upgrade"
      - "traefik.http.routers.interativa.middlewares=interativa-ws"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

volumes:
  interativa_data:
  interativa_uploads:

networks:
  network_public:
    external: true
