services:
  interativa:
    image: interativa:latest
    build: .
    pull_policy: build
    container_name: interativa
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_URL=${DATABASE_URL}
      - TZ=America/Sao_Paulo
    volumes:
      - interativa_uploads:/app/uploads
    networks:
      - network_public
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

volumes:
  interativa_uploads:

networks:
  network_public:
    external: true
